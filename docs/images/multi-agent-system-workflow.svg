<svg width="1600" height="1180" viewBox="0 0 1600 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFEFF"/>
      <stop offset="1" stop-color="#F2F7FF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F766E"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #334155; }
      .lane { font: 700 18px Arial, sans-serif; fill: #0F172A; }
      .label { font: 700 15px Arial, sans-serif; fill: #0F172A; }
      .meta { font: 400 13px Arial, sans-serif; fill: #475569; }
      .flow { stroke: #0F766E; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .box { fill: url(#panel); stroke: #CBD5E1; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .entry { fill: #DBEAFE; stroke: #93C5FD; }
      .process { fill: #ECFDF5; stroke: #86EFAC; }
      .decision { fill: #FEF3C7; stroke: #FCD34D; }
      .store { fill: #FCE7F3; stroke: #F9A8D4; }
      .warning { fill: #FEE2E2; stroke: #FCA5A5; }
    </style>
  </defs>

  <rect width="1600" height="1180" fill="url(#bg)"/>

  <text x="80" y="70" class="title">multi-agent-system Operational Workflow</text>
  <text x="80" y="102" class="subtitle">End-to-end request movement across the three implemented Streamlit workflows.</text>

  <rect x="60" y="150" width="1480" height="980" rx="28" fill="#FFFFFF" stroke="#D7E3F4" stroke-width="2"/>

  <text x="110" y="200" class="lane">Shared Entry</text>
  <rect x="100" y="225" width="260" height="96" class="box entry"/>
  <text x="128" y="260" class="label">Launch Streamlit App</text>
  <text x="128" y="286" class="meta">streamlit run streamlit_app.py</text>

  <rect x="420" y="225" width="250" height="96" class="box decision"/>
  <text x="455" y="260" class="label">Choose Workflow</text>
  <text x="455" y="286" class="meta">Add Context, Prompt Update, or Chat</text>

  <text x="110" y="395" class="lane">1. Context Ingestion</text>
  <rect x="100" y="420" width="240" height="100" class="box process"/>
  <text x="126" y="456" class="label">Select Agent + User Name</text>
  <text x="126" y="482" class="meta">Reads AGENTS_COLLECTION mapping</text>

  <rect x="400" y="420" width="220" height="100" class="box process"/>
  <text x="428" y="456" class="label">Upload File</text>
  <text x="428" y="482" class="meta">UI accepts pdf, txt, mov, mp4, jpg, jpeg</text>

  <rect x="680" y="420" width="240" height="110" class="box decision"/>
  <text x="715" y="458" class="label">PDF or TXT?</text>
  <text x="715" y="484" class="meta">Implemented ingestion path check</text>

  <rect x="980" y="400" width="240" height="140" class="box process"/>
  <text x="1012" y="438" class="label">Create Temp File</text>
  <text x="1012" y="464" class="meta">utils.create_temp_file</text>
  <text x="1012" y="490" class="meta">Persist upload for loader access</text>

  <rect x="1280" y="400" width="220" height="140" class="box process"/>
  <text x="1312" y="438" class="label">Load Document</text>
  <text x="1312" y="464" class="meta">PyMuPDFLoader or TextLoader</text>
  <text x="1312" y="490" class="meta">PDF path can parse images and tables</text>

  <rect x="1280" y="590" width="220" height="140" class="box process"/>
  <text x="1312" y="628" class="label">Chunk + Embed + Store</text>
  <text x="1312" y="654" class="meta">1000 size, 300 overlap, OpenAI embeddings,</text>
  <text x="1312" y="680" class="meta">write to Zilliz collection</text>

  <rect x="980" y="590" width="240" height="140" class="box warning"/>
  <text x="1010" y="628" class="label">Non-PDF/TXT Path</text>
  <text x="1010" y="654" class="meta">UI asks for GCP bucket, but processing flow</text>
  <text x="1010" y="680" class="meta">is not implemented in current code</text>

  <text x="110" y="805" class="lane">2. Prompt Management</text>
  <rect x="100" y="830" width="260" height="110" class="box process"/>
  <text x="128" y="868" class="label">Scan agent_prompts Directory</text>
  <text x="128" y="894" class="meta">Find all JSON prompt files recursively</text>

  <rect x="430" y="830" width="250" height="110" class="box process"/>
  <text x="458" y="868" class="label">Load Selected JSON</text>
  <text x="458" y="894" class="meta">Display current prompt in text area</text>

  <rect x="750" y="830" width="250" height="110" class="box process"/>
  <text x="786" y="868" class="label">Edit Prompt</text>
  <text x="786" y="894" class="meta">Operator updates assistant behavior</text>

  <rect x="1070" y="830" width="250" height="110" class="box store"/>
  <text x="1100" y="868" class="label">Save JSON Back to Disk</text>
  <text x="1100" y="894" class="meta">Prompt changes take effect for later runs</text>

  <text x="110" y="995" class="lane">3. Chat Execution</text>
  <rect x="100" y="1020" width="230" height="100" class="box process"/>
  <text x="126" y="1058" class="label">Capture Chat Input</text>
  <text x="126" y="1084" class="meta">Current branch handles text-only messages</text>

  <rect x="390" y="1020" width="230" height="100" class="box decision"/>
  <text x="424" y="1058" class="label">Text Present and No File?</text>
  <text x="424" y="1084" class="meta">Gate used in views/user_chat.py</text>

  <rect x="680" y="1020" width="230" height="100" class="box process"/>
  <text x="708" y="1058" class="label">Load commerce_growth.json</text>
  <text x="716" y="1084" class="meta">Current implementation uses fixed agent prompt</text>

  <rect x="970" y="1020" width="230" height="100" class="box process"/>
  <text x="999" y="1058" class="label">Append Session History</text>
  <text x="999" y="1084" class="meta">Prompt string includes prior messages</text>

  <rect x="1260" y="980" width="240" height="140" class="box process"/>
  <text x="1292" y="1018" class="label">Invoke ChatOpenAI</text>
  <text x="1292" y="1044" class="meta">Render response in Streamlit</text>
  <text x="1292" y="1070" class="meta">Persist messages to Firestore</text>

  <path d="M360 273 H420" class="flow"/>
  <path d="M545 321 V385 H220 V420" class="flow"/>
  <path d="M545 321 V805 H230 V830" class="flow"/>
  <path d="M545 321 V970 H215 V1020" class="flow"/>

  <path d="M340 470 H400" class="flow"/>
  <path d="M620 470 H680" class="flow"/>
  <path d="M920 470 H980" class="flow"/>
  <path d="M1220 470 H1280" class="flow"/>
  <path d="M1390 540 V590" class="flow"/>
  <path d="M800 530 V660 H980" class="flow"/>

  <path d="M360 885 H430" class="flow"/>
  <path d="M680 885 H750" class="flow"/>
  <path d="M1000 885 H1070" class="flow"/>

  <path d="M330 1070 H390" class="flow"/>
  <path d="M620 1070 H680" class="flow"/>
  <path d="M910 1070 H970" class="flow"/>
  <path d="M1200 1070 H1260" class="flow"/>
</svg>
